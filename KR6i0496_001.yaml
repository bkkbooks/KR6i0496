body:
  text: 後漢安息國三藏安世高譯聞如是一時佛遊於舍衛國祇樹給孤獨園佛告諸比丘比丘受教從佛而聽佛言比丘凡人為一法受塵自污迷惑憂愁沒無端際吾見其不得無上吉祥之道如丈夫欲見女子色是以好色之士為染為醉為貪為污為惑為著為住為受從婬女言故長久趨走往來為受懃苦耳常欲聞婬女之聲鼻欲聞其香舌欲得其味身欲更其細滑是以長久趨走往來受苦是故不當為女色聲香味細滑所染惑也當覺知是又復諸比丘凡人為法受塵自污迷惑憂愁沒而無際吾見其不得無上吉祥之道如婬女欲見男子色是以好色之女為染為醉為貪為污為惑為著為住為受為士色故長久趨走往來受苦耳常欲聞男子之聲鼻欲聞其香舌欲得其味身欲更其細滑是以長久趨走往來受苦是故不當為士色聲香味細滑所染惑也當覺知是佛說是已皆歡喜受行
